name: Update plots

on:
  push:
    paths:
      - 'measurements.csv'
      - 'bodyfat.ipynb'
      - 'requirements.txt'
      - '.github/workflows/update-plots.yml'
  workflow_dispatch:

jobs:
  regenerate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Execute notebook
        run: jupyter nbconvert --to notebook --execute bodyfat.ipynb --output bodyfat.ipynb

      - name: Commit updated artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add plots/ bodyfat.ipynb
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: regenerate plots [skip ci]"
            git push
          fi
